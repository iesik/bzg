<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bzg</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #fff;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

.wrap {
    position: relative;
    width: 72vw;
    max-width: 1200px;
}

.logo {
    width: 100%;
    display: block;
}

.slice {
    position: absolute;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url("bzg.jpeg");
    background-size: 100% 100%;
    background-repeat: no-repeat;
    opacity: 0;
    pointer-events: none;
}

/* 黑白切片 glitch：更明显，手机自动动 */
.s1 { animation: slice1 2.8s infinite; }
.s2 { animation: slice2 2.8s infinite; }
.s3 { animation: slice3 2.8s infinite; }
.s4 { animation: slice4 2.8s infinite; }

@keyframes slice1 {
    0%, 72%, 100% { opacity: 0; transform: translateX(0); clip-path: inset(0 0 0 0); }
    73% { opacity: 1; transform: translateX(-22px); clip-path: inset(8% 0 74% 0); }
    75% { opacity: 0; transform: translateX(0); }
}

@keyframes slice2 {
    0%, 74%, 100% { opacity: 0; transform: translateX(0); clip-path: inset(0 0 0 0); }
    75% { opacity: 1; transform: translateX(18px); clip-path: inset(34% 0 48% 0); }
    77% { opacity: 0; transform: translateX(0); }
}

@keyframes slice3 {
    0%, 76%, 100% { opacity: 0; transform: translateX(0); clip-path: inset(0 0 0 0); }
    77% { opacity: 1; transform: translateX(-14px); clip-path: inset(58% 0 25% 0); }
    79% { opacity: 0; transform: translateX(0); }
}

@keyframes slice4 {
    0%, 78%, 100% { opacity: 0; transform: translateX(0); clip-path: inset(0 0 0 0); }
    79% { opacity: 1; transform: translateX(24px); clip-path: inset(78% 0 8% 0); }
    81% { opacity: 0; transform: translateX(0); }
}
</style>
</head>

<body>
<div class="wrap">
    <img src="bzg.jpeg" class="logo">
    <div class="slice s1"></div>
    <div class="slice s2"></div>
    <div class="slice s3"></div>
    <div class="slice s4"></div>
</div>
</body>
</html>
