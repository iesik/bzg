<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bzg</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

.wrap {
    position: relative;
    display: inline-block;
}

.logo,
.glitch {
    width: 72vw;
    max-width: 1200px;
}

.logo {
    position: relative;
    z-index: 3;
}

.glitch {
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    mix-blend-mode: multiply;
    animation: bwGlitch 4s infinite;
}

@keyframes bwGlitch {

    0%, 84%, 100% {
        opacity: 0;
        transform: translate(0);
        clip-path: inset(0 0 0 0);
    }

    85% {
        opacity: .18;
        transform: translate(-8px, 0);
        clip-path: inset(0 0 72% 0);
    }

    87% {
        opacity: .22;
        transform: translate(8px, 0);
        clip-path: inset(38% 0 32% 0);
    }

    89% {
        opacity: .15;
        transform: translate(-4px, 0);
        clip-path: inset(72% 0 0 0);
    }

    91% {
        opacity: .12;
        transform: translate(5px, 0);
        clip-path: inset(20% 0 55% 0);
    }

    93% {
        opacity: 0;
        transform: translate(0);
        clip-path: inset(0 0 0 0);
    }
}
</style>
</head>

<body>
<div class="wrap">
    <img src="bzg.jpeg" class="glitch">
    <img src="bzg.jpeg" class="logo">
</div>
</body>
</html>
