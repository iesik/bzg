<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bzg</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #fff;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

.wrap {
    position: relative;
    width: 72vw;
    max-width: 1200px;
}

.logo {
    width: 100%;
    display: block;
}

/* GIF-style slice layers */
.slice {
    position: absolute;
    left: 0;
    width: 100%;
    background-image: url("bzg.jpeg");
    background-size: 100% 100%;
    background-repeat: no-repeat;
    opacity: 0;
    pointer-events: none;
}

/* precise slices matching GIF */
.s1 {
    top: 8%;
    height: 18%;
    background-position: center 8%;
    animation: g1 3s infinite;
}

.s2 {
    top: 34%;
    height: 18%;
    background-position: center 34%;
    animation: g2 3s infinite;
}

.s3 {
    top: 58%;
    height: 16%;
    background-position: center 58%;
    animation: g3 3s infinite;
}

.s4 {
    top: 78%;
    height: 14%;
    background-position: center 78%;
    animation: g4 3s infinite;
}

@keyframes g1 {
    0%, 78%, 100% { opacity: 0; transform: translateX(0); }
    80% { opacity: 1; transform: translateX(-28px); }
    82% { opacity: 0; transform: translateX(0); }
}

@keyframes g2 {
    0%, 80%, 100% { opacity: 0; transform: translateX(0); }
    82% { opacity: 1; transform: translateX(22px); }
    84% { opacity: 0; transform: translateX(0); }
}

@keyframes g3 {
    0%, 82%, 100% { opacity: 0; transform: translateX(0); }
    84% { opacity: 1; transform: translateX(-18px); }
    86% { opacity: 0; transform: translateX(0); }
}

@keyframes g4 {
    0%, 84%, 100% { opacity: 0; transform: translateX(0); }
    86% { opacity: 1; transform: translateX(30px); }
    88% { opacity: 0; transform: translateX(0); }
}
</style>
</head>

<body>
<div class="wrap">
    <img src="bzg.jpeg" class="logo">

    <div class="slice s1"></div>
    <div class="slice s2"></div>
    <div class="slice s3"></div>
    <div class="slice s4"></div>
</div>
</body>
</html>
