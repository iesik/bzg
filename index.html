
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bzg</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

.wrap {
    position: relative;
    display: inline-block;
}

.logo {
    width: 72vw;
    max-width: 1200px;
    position: relative;
    z-index: 2;
    transition: transform .15s ease;
}

.glitch1,
.glitch2 {
    position: absolute;
    top: 0;
    left: 0;
    width: 72vw;
    max-width: 1200px;
    opacity: 0;
    pointer-events: none;
    mix-blend-mode: screen;
}

.glitch1 {
    filter: drop-shadow(-4px 0 rgba(255,0,80,.9));
}

.glitch2 {
    filter: drop-shadow(4px 0 rgba(0,180,255,.9));
}

.wrap:hover .logo {
    animation: skew .15s infinite;
}

.wrap:hover .glitch1 {
    opacity: .7;
    animation: glitchA .12s infinite;
}

.wrap:hover .glitch2 {
    opacity: .7;
    animation: glitchB .12s infinite;
}

@keyframes glitchA {
    0% { transform: translate(0); }
    20% { transform: translate(-5px, -2px); }
    40% { transform: translate(5px, 2px); }
    60% { transform: translate(-3px, 1px); }
    80% { transform: translate(2px, -1px); }
    100% { transform: translate(0); }
}

@keyframes glitchB {
    0% { transform: translate(0); }
    20% { transform: translate(5px, 2px); }
    40% { transform: translate(-5px, -2px); }
    60% { transform: translate(3px, -1px); }
    80% { transform: translate(-2px, 1px); }
    100% { transform: translate(0); }
}

@keyframes skew {
    0% { transform: skewX(0deg); }
    25% { transform: skewX(-1deg); }
    50% { transform: skewX(1deg); }
    75% { transform: skewX(-1deg); }
    100% { transform: skewX(0deg); }
}
</style>
</head>

<body>
<div class="wrap">
    <img src="bzg.jpeg" class="glitch1">
    <img src="bzg.jpeg" class="glitch2">
    <img src="bzg.jpeg" class="logo">
</div>
</body>
</html>
