<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bzg</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

.wrap {
    position: relative;
    display: inline-block;
}

.logo,
.glitch1,
.glitch2 {
    width: 72vw;
    max-width: 1200px;
}

.logo {
    position: relative;
    z-index: 3;
    animation: skewPulse 5s infinite;
}

.glitch1,
.glitch2 {
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    pointer-events: none;
}

.glitch1 {
    filter: drop-shadow(-5px 0 rgba(255,0,80,.9));
    animation: glitchA 4s infinite;
}

.glitch2 {
    filter: drop-shadow(5px 0 rgba(0,180,255,.9));
    animation: glitchB 4s infinite;
}

@keyframes glitchA {
    0%, 88%, 100% {
        opacity: 0;
        transform: translate(0);
    }

    89% {
        opacity: .8;
        transform: translate(-6px, -2px);
    }

    91% {
        opacity: .5;
        transform: translate(5px, 2px);
    }

    93% {
        opacity: .9;
        transform: translate(-3px, 1px);
    }

    95% {
        opacity: 0;
        transform: translate(0);
    }
}

@keyframes glitchB {
    0%, 88%, 100% {
        opacity: 0;
        transform: translate(0);
    }

    90% {
        opacity: .7;
        transform: translate(6px, 2px);
    }

    92% {
        opacity: .5;
        transform: translate(-5px, -2px);
    }

    94% {
        opacity: .9;
        transform: translate(3px, -1px);
    }

    96% {
        opacity: 0;
        transform: translate(0);
    }
}

@keyframes skewPulse {
    0%, 88%, 100% {
        transform: skewX(0deg);
    }

    90% {
        transform: skewX(-1deg);
    }

    92% {
        transform: skewX(1deg);
    }

    94% {
        transform: skewX(-1deg);
    }
}
</style>
</head>

<body>
<div class="wrap">
    <img src="bzg.jpeg" class="glitch1">
    <img src="bzg.jpeg" class="glitch2">
    <img src="bzg.jpeg" class="logo">
</div>
</body>
</html>
